name: Betfair Daily Sync

"on":
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests gspread google-auth
      - name: Run sync
        env:
          BETFAIR_APP_KEY:         ${{ secrets.BETFAIR_APP_KEY }}
          BETFAIR_USERNAME:        ${{ secrets.BETFAIR_USERNAME }}
          BETFAIR_PASSWORD:        ${{ secrets.BETFAIR_PASSWORD }}
          GOOGLE_SHEET_NAME:       ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DAYS_TO_FETCH:           "2"
        run: python sync_engine.py
